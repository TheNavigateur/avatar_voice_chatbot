    let lastStatusText = "";
    function setBotStatusMessage(text, align = 'center') {
        if (text === lastStatusText) return;
        lastStatusText = text;

        const tDiv = document.getElementById('transcript');

        // For right-aligned messages (like "Listening..."), replace existing ones
        if (align === 'right') {
            // Remove any existing right-aligned status messages
            const existingRightMessages = tDiv.querySelectorAll('.bot-status-message-right');
            existingRightMessages.forEach(msg => msg.remove());
        }

        const div = document.createElement('div');
        // Use different classes for left vs right to distinguish them
        if (align === 'right') {
            div.className = 'bot-status-message bot-status-message-right';
        } else {
            div.className = 'bot-status-message bot-status-message-left';
        }

        let alignSelf = 'center';
        if (align === 'left') alignSelf = 'flex-start';
        if (align === 'right') alignSelf = 'flex-end';

        div.style.cssText = `text-align: ${align}; align-self: ${alignSelf}; color: #888; font-style: italic; margin: 0; font-size: 0.85em; opacity: 0.8; max-width: 85%;`;
        div.textContent = text;

        const isNearBottom = tDiv.scrollHeight - tDiv.scrollTop - tDiv.clientHeight < 100;
        tDiv.appendChild(div);
        if (isNearBottom) {
            tDiv.scrollTop = tDiv.scrollHeight;
        }
    }

    function clearBotStatusMessage() {
        // Clear right-aligned messages (like "Listening...") when conversation stops
        const tDiv = document.getElementById('transcript');
        const rightMessages = tDiv.querySelectorAll('.bot-status-message-right');
        rightMessages.forEach(msg => msg.remove());

        // Clear left-aligned thinking messages too
        const leftMessages = tDiv.querySelectorAll('.bot-status-message-left');
        leftMessages.forEach(msg => msg.remove());

        lastStatusText = ""; // Reset trackers so messages can be re-issued
    }

    const statusMessages = [
        "Thinking...",
        "Working on it...",
        "One moment...",
        "Checking details...",
        "Reviewing...",
        "Gathering information...",
        "Analyzing request...",
        "Processing..."
    ];

    function startProcessingStatus(userText) {
        if (hasStartedSpeakingThisResponse) return; // Ignore if speech already started
        if (statusInterval) clearInterval(statusInterval);

        // Shuffle pool
        const shuffled = [...statusMessages].sort(() => Math.random() - 0.5);
        let i = 0;

        setBotStatusMessage(shuffled[i], 'left');

        statusInterval = setInterval(() => {
            i = (i + 1) % shuffled.length;
            setBotStatusMessage(shuffled[i], 'left');
        }, 1200);
    }

    function stopProcessingStatus() {
        if (statusInterval) {
            clearInterval(statusInterval);
            statusInterval = null;
        }
        clearBotStatusMessage();
    }

    let speechQueue = [];
    let isPlayingQueue = false;

    async function processSpeechQueue() {
        if (speechQueue.length === 0 || isPlayingQueue) return;

        isPlayingQueue = true;
        const speechItem = speechQueue.shift();
        const textToSpeak = speechItem.text;

        try {
            // Re-apply protocol stripping for safety (though it should be stripped before queuing)
            let ttsText = textToSpeak;

            // Call /tts
            const response = await fetch('/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    text: ttsText,
                    voice_name: window.voiceName || 'en-GB-Chirp3-HD-Algenib',
                    language_code: 'en-GB',
                    provider: window.voiceProvider || 'google'
                })
            });

            if (!response.ok) {
                const errData = await response.json();
                console.error("[TTS] Server error:", errData.detail || response.statusText);
                throw new Error(errData.detail || "TTS failed");
            }

            const data = await response.json();
            if (!data.audio) {
                console.error("[TTS] No audio data in response:", data);
                throw new Error("No audio data");
            }

            const audio = window.audioElement;
            audio.src = "data:audio/mp3;base64," + data.audio;

            const onEndedHandler = () => {
                audio.removeEventListener('ended', onEndedHandler);
                isPlayingQueue = false;
                stopSpeaking();

                if (speechQueue.length === 0) {
                    isBotSpeaking = false;
                    restartRecognitionIfPossible();
                } else {
                    processSpeechQueue();
                }
            };
            audio.addEventListener('ended', onEndedHandler);

            const onPlayingHandler = () => {
                audio.removeEventListener('playing', onPlayingHandler);
                console.log("[TTS] playing event triggered. textToSpeak:", textToSpeak, "currentBotMsgDiv exists:", !!currentBotMsgDiv);
                isBotSpeaking = true;
                startSpeaking();
                updateAudioVolumeGlobal();
                clearBotStatusMessage();

                // Stop thinking messages once speech starts
                hasStartedSpeakingThisResponse = true;
                stopProcessingStatus();

                // Initialize UI bubble if it's the first audio segment
                if (!currentBotMsgDiv) {
                    currentBotMsgDiv = addMessage('Bot', '');
                    currentBotMsgContentEl = currentBotMsgDiv.querySelector('.bot-content-text');
                    console.log("[TTS] Created botMsgDiv on speech start.");

                    // Immediately render any protocols accumulated so far
                    if (currentFullResponse.includes('[') || currentFullResponse.includes(']')) {
                        const { checklistHtml, optionsHtml } = parseProtocols(currentFullResponse);
                        const checklistContainer = currentBotMsgDiv.querySelector('.bot-protocol-checklist');
                        const optionsContainer = currentBotMsgDiv.querySelector('.bot-protocol-options');
                        if (checklistContainer && checklistHtml) checklistContainer.innerHTML = checklistHtml;
                        if (optionsContainer && optionsHtml) optionsContainer.innerHTML = optionsHtml;
                    }
                }

                // Initialize UI bubble if it's the first audible segment
                if (!currentBotMsgDiv) {
                    // Create bubble with first chunk already included
                    currentBotMsgDiv = addMessage('Bot', textToSpeak);
                    currentBotMsgContentEl = currentBotMsgDiv.querySelector('.bot-content-text');
                    console.log("[TTS] Created botMsgDiv on speech start with text:", textToSpeak);

                    // Immediately render any protocols accumulated in previous silent chunks
                    if (currentFullResponse.includes('[') || currentFullResponse.includes(']')) {
                        const { checklistHtml, optionsHtml } = parseProtocols(currentFullResponse);
                        const checklistContainer = currentBotMsgDiv.querySelector('.bot-protocol-checklist');
                        const optionsContainer = currentBotMsgDiv.querySelector('.bot-protocol-options');
                        if (checklistContainer && checklistHtml) checklistContainer.innerHTML = checklistHtml;
                        if (optionsContainer && optionsHtml) optionsContainer.innerHTML = optionsHtml;
                    }
                } else if (currentBotMsgContentEl && textToSpeak) {
                    // Synchronized Text Display (Subsequent chunks)
                    const currentText = currentBotMsgContentEl.textContent;

                    // Add space if needed between logical chunks
                    if (currentText && !currentText.endsWith(' ') && !textToSpeak.startsWith(' ')) {
                        currentBotMsgContentEl.textContent += ' ';
                    }
                    currentBotMsgContentEl.textContent += textToSpeak;

                    // Auto-scroll
                    const tDiv = document.getElementById('transcript');
                    tDiv.scrollTop = tDiv.scrollHeight;
                }
            };
            audio.addEventListener('playing', onPlayingHandler);

            audio.play().catch(e => {
                console.error("[TTS] Playback blocked or failed:", e);
                stopSpeaking();
                isPlayingQueue = false;
                processSpeechQueue();
            });

        } catch (e) {
            console.error("[TTS] Error:", e);
            isPlayingQueue = false;
            stopSpeaking();
            if (speechQueue.length === 0) {
                isBotSpeaking = false;
                restartRecognitionIfPossible();
            } else {
                processSpeechQueue();
            }
        }
    }

    async function speak(text, shouldEnd = false) {
        if (!isConversationActive) return;

        // Ensure recognition is stopped while bot is speaking
        if (recognition) {
            try { recognition.stop(); } catch (e) { }
        }

        // Strip protocols for TTS
        let processedText = text;

        // Remove known protocol blocks first
        const protocols = [
            'SHOPPING_CHECKLIST', 'OPTIONS', 'OPTIONS_MULTI',
            'OPTIONS_GROUPED', 'PROPOSE_PRODUCTS', 'RESPONSE_OPTIONS',
            'SHOE_SIZE_SELECTOR', 'NAVIGATE_TO_PACKAGE'
        ];

        protocols.forEach(p => {
            // Match [PROTOCOL: data] or [PROTOCOL] [data] or [PROTOCOL]
            const regex = new RegExp('\\[' + p + ':?\\s*(\\[[\\s\\S]*?\\]|[\\w-]*?)\\]\\s*', 'g');
            processedText = processedText.replace(regex, '');
            // Also handle closed tags if any (e.g. [/SHOPPING_CHECKLIST])
            const closeRegex = new RegExp('\\[\\/' + p + '\\]', 'g');
            processedText = processedText.replace(closeRegex, '');
        });

        let ttsText = '';
        let i = 0;
        while (i < processedText.length) {
            if (processedText[i] === '[' && /^[A-Z_]+[:\]]/.test(processedText.substring(i + 1))) {
                let depth = 1; i++;
                while (i < processedText.length && depth > 0) {
                    if (processedText[i] === '[') depth++;
                    else if (processedText[i] === ']') depth--;
                    i++;
                }
            } else {
                ttsText += processedText[i];
                i++;
            }
        }

        // Basic normalization
        ttsText = ttsText.replace(/\*/g, '').replace(/_/g, '').trim();

        if (ttsText) {
            speechQueue.push({ text: ttsText });
            processSpeechQueue();
        }
    }


    // Globals for Audio Animation
    function startSpeaking() { window.isSpeaking = true; isBotSpeaking = true; }
    function stopSpeaking() {
        window.isSpeaking = false;

    function updateAudioVolumeGlobal() {
        if (!window.isSpeaking || !window.analyser) return;
        window.analyser.getByteFrequencyData(window.dataArray);
        let sum = 0;
        for (let i = 0; i < window.dataArray.length; i++) sum += window.dataArray[i];
        window.currentAudioVolume = (sum / window.dataArray.length) / 255;

        if (window.isSpeaking) requestAnimationFrame(updateAudioVolumeGlobal);
    }

    function base64ToBlob(base64, mimeType) {
        const byteCharacters = atob(base64);
        const byteNumbers = new Array(byteCharacters.length);
        for (let i = 0; i < byteCharacters.length; i++) { byteNumbers[i] = byteCharacters.charCodeAt(i); }
        const byteArray = new Uint8Array(byteNumbers);
        return new Blob([byteArray], { type: mimeType });
    }

    // --- Review Carousel Utilities ---
    window.moveCarousel = function (carouselId, direction, isAuto = false) {
        const carousel = document.getElementById(carouselId);
        if (!carousel) return;

        // Clear existing timer if it's a manual click
        if (!isAuto && carousel.dataset.timer) {
            clearInterval(carousel.dataset.timer);
            delete carousel.dataset.timer;
        }

        const slides = carousel.querySelectorAll('.review-slide');
        const indicator = carousel.querySelector('.carousel-indicator');
        if (slides.length <= 1) return;

        let activeIdx = 0;
        slides.forEach((s, i) => { if (s.classList.contains('active')) activeIdx = i; });

        slides[activeIdx].classList.remove('active');

        let nextIdx = activeIdx + direction;
        if (nextIdx >= slides.length) nextIdx = 0;
        if (nextIdx < 0) nextIdx = slides.length - 1;

        slides[nextIdx].classList.add('active');
        indicator.textContent = `${nextIdx + 1} / ${slides.length}`;
    };

    window.renderReviewCarousel = function (reviews, reviewLink) {
        if (!reviews || !Array.isArray(reviews) || reviews.length === 0) return '';

        const carouselId = 'carousel-' + Math.random().toString(36).substr(2, 9);

        let slidesHtml = '';
        reviews.forEach((review, idx) => {
            const isObj = typeof review === 'object' && review !== null;
            const text = isObj ? review.text : review;
            const rating = isObj ? review.rating : null;

            slidesHtml += `
                <div class="review-slide ${idx === 0 ? 'active' : ''}" data-index="${idx}">
                    <div style="font-style: italic; color: #555; line-height: 1.4; position: relative;">
                        "${text}"

                    ${rating ? `<div style="font-size: 0.75rem; color: #f39c12; margin-top: 6px; font-weight: 600;">⭐ ${rating}/5</div>` : ''}
                </div>
            `;
        });

        // Auto-cycle setup
        setTimeout(() => {
            const carousel = document.getElementById(carouselId);
            if (carousel && reviews.length > 1) {
                const timer = setInterval(() => {
                    moveCarousel(carouselId, 1, true);
                }, 4000); // Cycle every 4 seconds

    window.moveSlider = function (sliderId, direction) {
        const slider = document.getElementById(sliderId);
        if (!slider) return;

        const container = slider.querySelector('.slide-container');
        const dots = slider.querySelectorAll('.dot');
        let current = parseInt(slider.getAttribute('data-current'));
        const total = parseInt(slider.getAttribute('data-total'));

        current += direction;
        if (current >= total) current = 0;
        if (current < 0) current = total - 1;

        slider.setAttribute('data-current', current);
        container.style.transform = `translateX(-${current * 100}%)`;

        dots.forEach((dot, idx) => {
            if (idx === current) dot.classList.add('active');
            else dot.classList.remove('active');
        });
    };

    async function sendChatMessage(textOverride) {
        // STOP DAYDREAMING
        if (typeof window.stopDaydreamCycle === 'function') {
            window.stopDaydreamCycle();
        }
        initAudio();
        const input = document.getElementById('chat-input');
        const text = (textOverride !== undefined ? textOverride : input.value).trim();
        if (!text) return;

        if (isProcessing && textOverride !== undefined) {
            console.log('[Chat] Explicit interaction override during processing.');
            isProcessing = false;
            stopProcessingStatus();
        }

        if (isProcessing) return;

        input.value = '';
        addMessage('You', text);

        // Hide start buttons
        const startContainer = document.getElementById('dynamic-start-container');
        if (startContainer) startContainer.remove();

        isConversationActive = true;
        isProcessing = true;
        hasStartedSpeakingThisResponse = false; // Reset for new response
        currentFullResponse = ""; // Reset stream tracker
        currentBotMsgDiv = null;  // Reset placeholder tracker
        startProcessingStatus(text);

        let currentChunk = "";

        try {
            const response = await fetch('/chat_stream', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    message: text,
                    session_id: sessionId,
                    package_id: currentPackageDetails?.id,
                    region: window.currentRegion || 'UK'
                })
            });

            const reader = response.body.getReader();
            const decoder = new TextDecoder();

            while (true) {
                const { value, done } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value);
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.startsWith('data: ')) {
                        const dataStr = line.slice(6).trim();
                        if (dataStr === '[DONE]') continue;

                        // Robustly handle cases where multiple JSON objects might be in one line/chunk
                        const blocks = dataStr.match(/\{[\s\S]*?\}/g) || [dataStr];

                        for (const block of blocks) {
                            try {
                                const data = JSON.parse(block);
                                if (data.session_id) {
                                    sessionId = data.session_id;
                                    localStorage.setItem('chat_session_id', sessionId);
                                    continue;
                                }

                                if (data.chunk) {
                                    currentFullResponse += data.chunk;
                                    currentChunk += data.chunk;

                                    // Trigger Early TTS on sentence boundaries
                                    if (/[.!?]\s$/.test(currentChunk) || currentChunk.length > 200) {
                                        console.log("[Stream] Triggering early TTS for chunk:", currentChunk);
                                        speak(currentChunk);
                                        currentChunk = "";
                                    }

                                    // Early protocol rendering ONLY if speech has already started
                                    if (currentBotMsgDiv && (currentFullResponse.includes('[') || currentFullResponse.includes(']'))) {
                                        const { checklistHtml, optionsHtml } = parseProtocols(currentFullResponse);
                                        const checklistContainer = currentBotMsgDiv.querySelector('.bot-protocol-checklist');
                                        const optionsContainer = currentBotMsgDiv.querySelector('.bot-protocol-options');
                                        if (checklistContainer && checklistHtml) checklistContainer.innerHTML = checklistHtml;
                                        if (optionsContainer && optionsHtml) optionsContainer.innerHTML = optionsHtml;
                                    }
                                }
                            } catch (e) {
                                console.warn("[Stream] Failed to parse block:", block);
                            }
                        }
                    }
                }
            }

            // Final chunk
            if (currentChunk.trim()) {
                speak(currentChunk);
            }

            // Wait for speech to finish before finalizing the UI
            // This ensures piece-by-piece display is followed by full protocol rendering
            console.log("[Chat] Waiting for speech to finish. Queue len:", speechQueue.length, "isBotSpeaking:", isBotSpeaking, "isPlayingQueue:", isPlayingQueue);
            while (speechQueue.length > 0 || isBotSpeaking || isPlayingQueue) {
                await new Promise(r => setTimeout(r, 100));
            }
            console.log("[Chat] Speech finished. Finalizing UI.");

            stopProcessingStatus();
            isProcessing = false;

            // Manual restart as speech is finished and isProcessing is reset
            restartRecognitionIfPossible();

            // Re-render full bot response for protocols
            if (currentBotMsgDiv) {
                // Speech happened, replace the dynamic placeholder with the final rendered one
                addMessage('Bot', currentFullResponse);
                currentBotMsgDiv.remove();
                currentBotMsgDiv = null;
                currentBotMsgContentEl = null;
            } else if (currentFullResponse.trim()) {
                // No speech happened (or no text to speak) but we have content/protocols
                addMessage('Bot', currentFullResponse);
            }

            updatePackages();

        } catch (e) {
            console.error("Chat message failed:", e);
            isProcessing = false;
            stopProcessingStatus();
            clearBotStatusMessage();
        }
    }

    // Add Enter key listener
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && document.activeElement.id === 'chat-input') {
            sendChatMessage();
        }
    });

    async function removeItemFromPackage(packageId, itemId) {
        if (!confirm("Are you sure you want to remove this item?")) return;

        console.log(`[UI] Removing item ${itemId} from package ${packageId}`);
        try {
            const res = await fetch(`/api/packages/${sessionId}/${packageId}/items/${itemId}`, {
                method: 'DELETE'
            });
            if (res.ok) {
                const updatedPkg = await res.json();
                console.log("[UI] Item removed successfully");
                // Refresh both the list and the details view
                await updatePackages();
                showPackageDetails(updatedPkg);
            } else {
                const err = await res.json();
                alert("Error removing item: " + (err.detail || "Unknown error"));
            }
        } catch (e) {
            console.error("Failed to remove item", e);
            alert("Failed to remove item");
        }
    }

    async function bookPackage(packageId) {
        if (!sessionId) return;
        setBotStatusMessage("Processing booking...", 'center');
        try {
            const res = await fetch(`/api/packages/${sessionId}/${packageId}/book`, {
                method: 'POST'
            });
            const data = await res.json();
            if (data.status === 'success') {
                alert("Success! " + data.message);
                // Refresh list and reopening details
                const pkgs = await updatePackages();
                const p = pkgs.find(p => p.id === packageId);
                if (p) showPackageDetails(p);
            } else {
                alert("Booking failed: " + data.message);
            }
        } catch (e) {
            console.error(e);
            alert("Booking error.");
        } finally {
            clearBotStatusMessage();
        }
    }

    // Expose globals
    window.sendChatMessage = sendChatMessage;
    window.continueShoppingConversation = continueShoppingConversation;
    window.updateChecklistFact = updateChecklistFact;
    window.switchView = switchView;
    window.toggleSidebar = toggleSidebar;
    window.updatePackages = updatePackages;
    window.saveProfile = saveProfile;
    window.cancelProfileEdit = cancelProfileEdit;
    window.toggleProfileEdit = toggleProfileEdit;
    window.showPackageDetails = showPackageDetails;
    window.closePackageDetails = closePackageDetails;
    window.bookPackage = bookPackage;
    window.removeItemFromPackage = removeItemFromPackage;

    window.openAllAmazonLinks = function (pkgId) {
        // Re-query links based on pkgId class
        const links = document.querySelectorAll(`.amz-link-${pkgId}`);
        if (links.length === 0) return;
        if (confirm(`Open ${links.length} Amazon tabs?`)) {
            links.forEach(link => window.open(link.href, '_blank'));
        }
    };

    // --- Daydream Thinking Bubbles ---
    const daydreamExperiences = [
        {
            title: "Luxury Overwater Villa",
            image: "/static/daydreams/villa.png",
            link: "https://www.visitmaldives.com"
        },
        {
            title: "Romantic Beach Dinner",
            image: "/static/daydreams/dinner.png",
            link: "https://www.tripadvisor.com"
        },
        {
            title: "Crystal Clear Snorkeling",
            image: "/static/daydreams/snorkeling.png",
            link: "https://www.padi.com"
        },
        {
            title: "Stunning Infinity Pool",
            image: "/static/daydreams/pool.png",
            link: "https://www.luxurytraveldiary.com"
        },
        {
            title: "Relaxing Spa Retreat",
            image: "/static/daydreams/spa.png",
            link: "https://www.spafinder.com"
        }
    ];

    let currentDaydreamIndex = 0;
    let daydreamSide = 1; // 1 for right, -1 for left
    window.daydreamInterval = null;
    window.activeDaydreamElements = [];

    function createDaydreamBubble() {
        const container = document.querySelector('.avatar-container');
        if (!container) return;

        const experience = daydreamExperiences[currentDaydreamIndex];
        currentDaydreamIndex = (currentDaydreamIndex + 1) % daydreamExperiences.length;

        const rect = container.getBoundingClientRect();

        // --- TUNABLE PARAMETERS ---
        const trailStartY = 80;       // Vertical start (pixels from top)
        const trailStartXOffset = 90;  // Horizontal start shift
        const horizontalOffset = 180;  // Distance to main bubble center
        const bubbleTop = 15;          // Bubble vertical position
        const arcHeight = 10;          // Height of the curve peak
        const bubbleRadius = 54;       // Distance from center to stop dots (edge)
        const trailSpacingExp = 1.9;   // Spacing exponent (smaller = dots further from start)
        const trailDotCount = 2;       // Number of trailing dots
        const trailDotMinSize = 10;    // Size of the smallest dot
        const trailDotMaxSize = 20;    // Size of the largest dot

        // RESPONSIVE ANCHORING: Use offsets from head center (50%)
        const mainCenterOffsetX = horizontalOffset * daydreamSide;
        daydreamSide *= -1;

        const mainCenterY = bubbleTop + 65;
        const startOffsetX = trailStartXOffset * (mainCenterOffsetX > 0 ? 1 : -1);

        const totalDist = Math.hypot(mainCenterOffsetX - startOffsetX, mainCenterY - trailStartY);
        const edgeRatio = Math.max(0, (totalDist - bubbleRadius) / totalDist);

        const newElements = [];

        // Create trailing dots on an arc
        for (let i = 0; i < trailDotCount; i++) {
            const dot = document.createElement('div');

            // Map i to float levels 0 to 2
            const floatLevel = trailDotCount > 1 ? Math.floor((i / (trailDotCount - 1)) * 2) : 1;
            dot.className = `daydream-dot float-l${floatLevel}`;

            // Proportional scaling with exponential bias, but stop at the bubble edge
            const ratio = Math.pow((i + 1) / (trailDotCount + 1), trailSpacingExp) * edgeRatio;

            // Quadratic arc path scaling from startOffsetX to mainCenterOffsetX
            const dotOffsetX = startOffsetX + (mainCenterOffsetX - startOffsetX) * ratio;
            const dotY = trailStartY + (mainCenterY - trailStartY) * ratio - (arcHeight * Math.sin(Math.PI * ratio));

            // Dynamic size calculation (interpolated between min and max)
            const dotSize = trailDotMinSize + ((trailDotMaxSize - trailDotMinSize) * (i / (trailDotCount - 1 || 1)));
            dot.style.width = `${dotSize}px`;
            dot.style.height = `${dotSize}px`;

            // Anchor to 50% and shift by offset
            dot.style.left = `calc(50% + ${dotOffsetX - dotSize / 2}px)`;
            dot.style.top = `${dotY - dotSize / 2}px`;

            container.appendChild(dot);
            newElements.push(dot);
        }

        // Create MAIN bubble
        const bubble = document.createElement('div');
        bubble.className = 'daydream-bubble float-l3';
        bubble.title = experience.title;

        const targetLeftOffset = mainCenterOffsetX - 65;
        bubble.style.left = `calc(50% + ${targetLeftOffset}px)`;
        bubble.style.top = `${bubbleTop}px`;

        const img = document.createElement('img');
        img.src = experience.image;
        img.className = 'daydream-image';
        img.alt = experience.title;

        bubble.appendChild(img);
        container.appendChild(bubble);
        newElements.push(bubble);

        // --- CROSSFADE LOGIC ---
        // Fade out previous elements
        const oldElements = window.activeDaydreamElements;
        oldElements.forEach(el => {
            el.classList.remove('active');
            el.classList.add('fading');
        });

        // Set a timeout to remove old elements
        setTimeout(() => {
            oldElements.forEach(el => el.remove());
        }, 1500);

        // Fade in new elements
        window.activeDaydreamElements = newElements;
        newElements.forEach((el, idx) => {
            setTimeout(() => el.classList.add('active'), idx * 100);
        });

        bubble.onclick = () => {
            window.open(experience.link, '_blank');
        };
    }

    function startDaydreamCycle() {
        console.log("Starting Daydream Cycle...");
        // Start IMMEDIATELY
        createDaydreamBubble();
        // Cycle every 10 seconds (allowing 2s overlap with lifetime/fade)
        window.daydreamInterval = setInterval(createDaydreamBubble, 10000);
    }
    window.startDaydreamCycle = startDaydreamCycle;

    function stopDaydreamCycle() {
        if (window.daydreamInterval) {
            console.log("Stopping Daydream Cycle...");
            clearInterval(window.daydreamInterval);
            window.daydreamInterval = null;
        }
        // Remove active elements immediately
        if (window.activeDaydreamElements.length > 0) {
            window.activeDaydreamElements.forEach(el => el.remove());
            window.activeDaydreamElements = [];
        }
    }
    window.stopDaydreamCycle = stopDaydreamCycle;

    // Trigger daydream cycle moved to avatar load success callbacks

</script>
