<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avatar Debugger</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #333;
            color: white;
            font-family: monospace;
        }

        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            pointer-events: none;
        }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>

<body>
    <div id="info">Loading...</div>
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        const info = document.getElementById('info');
        const container = document.getElementById('canvas-container');

        // Scene
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        // Camera
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.01, 1000);
        camera.position.set(0, 1, 2);

        // Renderer
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.outputEncoding = THREE.sRGBEncoding;
        container.appendChild(renderer.domElement);

        // Lights
        const ambientLight = new THREE.AmbientLight(0xffffff, 1.0);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffffff, 1.5);
        dirLight.position.set(2, 2, 5);
        scene.add(dirLight);

        // Controls
        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // Grid
        const gridHelper = new THREE.GridHelper(10, 10);
        scene.add(gridHelper);
        const axesHelper = new THREE.AxesHelper(1);
        scene.add(axesHelper);

        // Load
        const loader = new THREE.GLTFLoader();
        const url = '/static/jackie.glb';

        info.innerHTML = "Loading " + url + "...";

        loader.load(url, (gltf) => {
            const avatar = gltf.scene;
            scene.add(avatar);

            // Calculate bounding box
            const box = new THREE.Box3().setFromObject(avatar);
            const size = new THREE.Vector3();
            box.getSize(size);
            const center = new THREE.Vector3();
            box.getCenter(center);

            info.innerHTML = `Loaded!<br>
            Bounding Box Size: ${size.x.toFixed(3)}, ${size.y.toFixed(3)}, ${size.z.toFixed(3)}<br>
            Center: ${center.x.toFixed(3)}, ${center.y.toFixed(3)}, ${center.z.toFixed(3)}<br>
            Meshes: ${countMeshes(avatar)}`;

            // Fit camera
            const maxDim = Math.max(size.x, size.y, size.z);
            const fov = camera.fov * (Math.PI / 180);
            let cameraZ = Math.abs(maxDim / 2 * Math.tan(fov * 2)); // rough estimate
            cameraZ *= 2.5; // Zoom out a bit

            camera.position.set(center.x, center.y, center.z + cameraZ);
            camera.lookAt(center);
            controls.target.copy(center);

        }, (xhr) => {
            // progress
        }, (error) => {
            console.error(error);
            info.innerHTML = "Error loading: " + error.message;
        });

        function countMeshes(obj) {
            let count = 0;
            obj.traverse((child) => {
                if (child.isMesh) count++;
            });
            return count;
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>

</html>
